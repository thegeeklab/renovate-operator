apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
    name: {{ include "renovate-operator.resourceName" (dict "suffix" "webhook-configuration" "context" $) }}
webhooks:
    - admissionReviewVersions:
        - v1
      clientConfig:
        service:
            name: {{ include "renovate-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}
            namespace: {{ .Release.Namespace }}
            path: /mutate-renovate-thegeeklab-de-v1beta1-discovery
      failurePolicy: Fail
      name: mdiscovery-v1beta1.kb.io
      rules:
        - apiGroups:
            - renovate.thegeeklab.de
          apiVersions:
            - v1beta1
          operations:
            - CREATE
            - UPDATE
          resources:
            - discoveries
      sideEffects: None
    - admissionReviewVersions:
        - v1
      clientConfig:
        service:
            name: {{ include "renovate-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}
            namespace: {{ .Release.Namespace }}
            path: /mutate-renovate-thegeeklab-de-v1beta1-renovateconfig
      failurePolicy: Fail
      name: mrenovateconfig-v1beta1.kb.io
      rules:
        - apiGroups:
            - renovate.thegeeklab.de
          apiVersions:
            - v1beta1
          operations:
            - CREATE
            - UPDATE
          resources:
            - renovateconfigs
      sideEffects: None
    - admissionReviewVersions:
        - v1
      clientConfig:
        service:
            name: {{ include "renovate-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}
            namespace: {{ .Release.Namespace }}
            path: /mutate-renovate-thegeeklab-de-v1beta1-renovator
      failurePolicy: Fail
      name: mrenovator-v1beta1.kb.io
      rules:
        - apiGroups:
            - renovate.thegeeklab.de
          apiVersions:
            - v1beta1
          operations:
            - CREATE
            - UPDATE
          resources:
            - renovators
      sideEffects: None
    - admissionReviewVersions:
        - v1
      clientConfig:
        service:
            name: {{ include "renovate-operator.resourceName" (dict "suffix" "webhook-service" "context" $) }}
            namespace: {{ .Release.Namespace }}
            path: /mutate-renovate-thegeeklab-de-v1beta1-runner
      failurePolicy: Fail
      name: mrunner-v1beta1.kb.io
      rules:
        - apiGroups:
            - renovate.thegeeklab.de
          apiVersions:
            - v1beta1
          operations:
            - CREATE
            - UPDATE
          resources:
            - runners
      sideEffects: None

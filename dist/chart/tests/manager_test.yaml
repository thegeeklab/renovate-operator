suite: test manager deployment
templates:
  - templates/manager/manager.yaml
tests:
  - it: should render the manager deployment with default values
    asserts:
      - isKind:
          of: Deployment
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-renovate-operator-controller-manager
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/thegeeklab/renovate-operator:latest

  - it: should render the manager deployment with custom values
    set:
      manager.replicas: 3
      manager.image.tag: v1.2.3
    asserts:
      - equal:
          path: spec.replicas
          value: 3
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/thegeeklab/renovate-operator:v1.2.3

  - it: should disable metrics server when metrics.enable is false
    set:
      metrics.enable: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --metrics-bind-address=0

  - it: should enable metrics server when metrics.enable is true
    set:
      metrics.enable: true
      metrics.port: 8443
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --metrics-bind-address=:8443

suite: test servicemonitor resources
templates:
  - templates/monitoring/servicemonitor.yaml
tests:
  - it: should not render servicemonitor by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render servicemonitor when prometheus is enabled
    release:
      name: renovate
    set:
      prometheus.enable: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.name
          value: renovate-controller-manager-metrics-monitor
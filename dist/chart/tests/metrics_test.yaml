suite: test metrics resources
templates:
  - templates/metrics/metrics-service.yaml
tests:
  - it: should render metrics service by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-renovate-operator-metrics-service
      - equal:
          path: spec.ports[0].port
          value: 8443

  - it: should not render metrics service when disabled
    set:
      metrics.enable: false
    asserts:
      - hasDocuments:
          count: 0
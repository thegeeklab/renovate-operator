<div
  class="rounded-lg bg-gray-900 shadow-lg overflow-hidden flex flex-col mt-6 border border-gray-700"
>
  <div
    class="flex items-center justify-between bg-gray-800 px-4 py-2 border-b border-gray-700"
  >
    <span class="text-xs font-mono text-gray-400">{{ .JobName }}</span>

    <button
      type="button"
      onclick="document.getElementById('log-viewer').innerHTML = ''"
      class="text-gray-400 hover:text-white transition-colors"
    >
      <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path
          fill-rule="evenodd"
          d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
          clip-rule="evenodd"
        />
      </svg>
    </button>
  </div>

  <div class="p-4 overflow-x-auto max-h-[500px] overflow-y-auto">
    {{ if .Error }}
    <div class="flex flex-col items-center justify-center py-8 text-gray-500">
      <svg
        class="h-10 w-10 text-gray-600 mb-3"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
        />
      </svg>
      <p class="text-sm font-mono text-center px-4">{{ .Error }}</p>
    </div>
    {{ else }}
    <pre
      class="text-xs font-mono text-gray-300 whitespace-pre-wrap break-all leading-relaxed"
    ><code>{{ .Content }}</code></pre>
    {{ end }}
  </div>
</div>

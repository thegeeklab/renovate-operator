---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../default
  - manifest.yaml

helmCharts:
  - name: gitea
    repo: https://dl.gitea.com/charts/
    version: 12.6.0
    releaseName: gitea
    namespace: gitea
    valuesInline:
      image:
        registry: "docker.io"
        repository: gitea/gitea
        rootless: false
      gitea:
        admin:
          username: "renovate"
          password: "password"
        config:
          database:
            DB_TYPE: sqlite3
      service:
        http:
          type: LoadBalancer
          port: 3000
      strategy:
        type: Recreate
      test:
        enabled: false
      persistence:
        enabled: true
        create: true
        mount: true
        claimName: gitea-shared-storage
        size: 10Gi
      postgresql-ha:
        enabled: false
      valkey-cluster:
        enabled: false
      postExtraInitContainers:
        - name: bootstrap
          image: docker.io/gitea/gitea:latest
          command:
            - /bin/bash
            - -c
            - |
              apk add --no-cache jq curl su-exec
              /usr/bin/entrypoint &
              until curl --output /dev/null --silent --head --fail http://localhost:3000; do printf '.'; sleep 1; done

              if [ ! -f /data/gitea/INIT ]; then
                echo "Performing first-time initialization..."
                export GITEA_TOKEN=$(su-exec git gitea admin user generate-access-token -u renovate --scopes write:organization,write:repository,write:admin,write:user,write:issue --raw)
                GITEA_OAUTH_APP=$(curl -s -X 'POST' 'http://localhost:3000/api/v1/user/applications/oauth2' \
                  -H 'accept: application/json' -H 'Content-Type: application/json' -H "Authorization: token ${GITEA_TOKEN}" \
                  -d '{ "name": "renovate-operator", "confidential_client": true, "redirect_uris": [ "http://renovate-operator-receiver-service.renovate-system.svc.cluster.local:8083/oauth/callback" ] }')
                curl -s -X 'POST' \
                  'http://localhost:3000/api/v1/orgs' \
                  -H 'accept: application/json' \
                  -H 'Content-Type: application/json' \
                  -H "Authorization: token ${GITEA_TOKEN}" \
                  -d '{ "username": "testorg", "visibility": "public" }'
                echo $GITEA_OAUTH_APP | jq -r .client_id > /data/gitea/client_id
                echo $GITEA_OAUTH_APP | jq -r .client_secret > /data/gitea/client_secret
                echo $GITEA_TOKEN > /data/gitea/gitea_token
                touch /data/gitea/INIT
              else
                export GITEA_TOKEN=$(cat /data/gitea/gitea_token)
              fi

              REPOS=( "12260" "27806" )
              for repo in "${REPOS[@]}"; do
                echo "Checking for repository testorg/$repo..."
                http_code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3000/api/v1/repos/testorg/$repo" -H "Authorization: token ${GITEA_TOKEN}")
                echo "Repository check for testorg/$repo returned http code: $http_code"
                if [ $http_code -ne 200 ]; then
                  response_code=$(curl -s -w "%{http_code}" -o /dev/null -X 'POST' 'http://localhost:3000/api/v1/repos/migrate' \
                    -H 'accept: application/json' \
                    -H 'Content-Type: application/json' \
                    -H "Authorization: token ${GITEA_TOKEN}" \
                    -d "{ \"clone_addr\": \"https://github.com/renovate-reproductions/$repo.git\", \"repo_name\": \"$repo\", \"repo_owner\": \"testorg\", \"private\": false }")
                  echo "Migration request for testorg/$repo returned http code: $response_code"
                fi
              done

              echo -e "\n--- GITEA CLIENT ID ---\n$(cat /data/gitea/client_id)"
              echo -e "\n--- GITEA CLIENT SECRET ---\n$(cat /data/gitea/client_secret)"
              echo -e "\n--- GITEA TOKEN ---\n$(cat /data/gitea/gitea_token)"
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            - name: GITEA__server__DOMAIN
              value: "gitea-http.gitea.svc.cluster.local"
            - name: GITEA__server__ROOT_URL
              value: "http://gitea-http.gitea.svc.cluster.local:3000"
            - name: GITEA__webhook__ALLOWED_HOST_LIST
              value: "*"
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA__security__INTERNAL_TOKEN
              value: "123456"
            - name: GITEA__repository__DEFAULT_PRIVATE
              value: "public"
            - name: GITEA__repository__DEFAULT_PUSH_CREATE_PRIVATE
              value: "false"
            - name: GITEA__repository__ENABLE_PUSH_CREATE_USER
              value: "true"
            - name: GITEA__repository__ENABLE_PUSH_CREATE_ORG
              value: "true"
            - name: GITEA__log__logger_0x2E_router_0x2E_MODE
              value: ""
            - name: GITEA__server__LANDING_PAGE
              value: explore
            - name: GITEA__actions__ENABLED
              value: "false"
          volumeMounts:
            - name: data
              mountPath: /data
          workingDir: /data

patches:
  - path: patch/deployment.yaml

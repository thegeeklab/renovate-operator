---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../default
  - manifests.yaml

helmCharts:
  - name: gitea
    repo: https://dl.gitea.com/charts/
    version: 12.5.0
    releaseName: gitea
    namespace: gitea
    valuesInline:
      image:
        repository: gitea/gitea
        tag: 1.26.0
      gitea:
        # Default credentials for local Kind cluster development only. Do not use in production.
        admin:
          username: "gitea_admin"
          password: "password"
        config:
          database:
            DB_TYPE: sqlite3
      service:
        http:
          type: LoadBalancer
          port: 3000
      test:
        enabled: false
      persistence:
        enabled: true
        create: true
        mount: true
        claimName: gitea-shared-storage
        size: 10Gi
      postgresql-ha:
        enabled: false
      valkey-cluster:
        enabled: false
      postExtraInitContainers:
        - name: bootstrap
          image: gitea/gitea:1.26.0
          command:
            - /bin/bash
            - -c
            - |
              apk add --no-cache jq curl
              /usr/bin/entrypoint &
              until curl --output /dev/null --silent --head --fail http://localhost:3000; do printf '.'; sleep 1; done
              if [ ! -f /data/INIT ]; then
                setpriv --reuid=git --regid=git --init-groups gitea admin user create --username gitea_admin --password password --email gitea_admin@localhost --admin
                export GITEA_TOKEN=$(setpriv --reuid=git --regid=git --init-groups gitea admin user generate-access-token -u gitea_admin --scopes write:organization,write:repository,write:admin,write:user --raw)
                GITEA_OAUTH_APP=$(curl -s -X 'POST' 'http://localhost:3000/api/v1/user/applications/oauth2' \
                  -H 'accept: application/json' -H 'Content-Type: application/json' -H "Authorization: token $${GITEA_TOKEN}" \
                  -d '{ "name": "renovate-operator", "confidential_client": true, "redirect_uris": [ "http://renovate-operator-receiver-service.renovate-system.svc.cluster.local:8083/oauth/callback" ] }')
                curl -s -X 'POST' \
                  'http://localhost:3000/api/v1/orgs' \
                  -H 'accept: application/json' \
                  -H 'Content-Type: application/json' \
                  -H "Authorization: token $${GITEA_TOKEN}" \
                  -d '{ "username": "testorg", "visibility": "public" }'
                curl -s -X 'POST' \
                  'http://localhost:3000/api/v1/repos/migrate' \
                  -H 'accept: application/json' \
                  -H 'Content-Type: application/json' \
                  -H "Authorization: token $${GITEA_TOKEN}" \
                  -d '{ "clone_addr": "https://github.com/renovate-bot/renovate.git", "uid": 1, "repo_name": "renovate-test", "repo_owner": "testorg", "private": false }'
                echo $$GITEA_OAUTH_APP | jq -r .client_id > /data/client_id
                echo $$GITEA_OAUTH_APP | jq -r .client_secret > /data/client_secret
                echo $$GITEA_TOKEN > /data/gitea_token
                touch /data/INIT
              fi
              cat /data/client_id
              cat /data/client_secret
              cat /data/gitea_token
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          workingDir: /data

patches:
  - path: patch/deployment.yaml
  - path: patch/frontend.yaml

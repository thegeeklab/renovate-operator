---
when:
  - event: [pull_request, tag]
  - event: [push, manual]
    branch:
      - ${CI_REPO_DEFAULT_BRANCH}

steps:
  - name: changelog
    image: quay.io/thegeeklab/git-sv
    commands:
      - git sv current-version
      - git sv release-notes -t ${CI_COMMIT_TAG:-next} -o CHANGELOG.md
      - cat CHANGELOG.md

  - name: chart-version
    image: quay.io/thegeeklab/kube-tools
    commands:
      - VERSION="${CI_COMMIT_TAG#v}"
      - yq eval '.version = strenv(VERSION)' -i dist/chart/Chart.yaml
      - yq eval '.appVersion = strenv(VERSION)' -i dist/chart/Chart.yaml
    when:
      - event: [tag]

  - name: publish-github
    image: docker.io/plugins/github-release
    settings:
      api_key:
        from_secret: github_token
      files:
        - dist/install.yaml
      note: CHANGELOG.md
      overwrite: true
      title: ${CI_COMMIT_TAG}
    when:
      - event: [tag]

  - name: publish-chart-dockerhub
    image: quay.io/thegeeklab/kube-tools
    depends_on: [publish-github]
    environment:
      DOCKER_USERNAME:
        from_secret: docker_username
      DOCKER_PASSWORD:
        from_secret: docker_password
    commands:
      - echo "$DOCKER_PASSWORD" | helm registry login docker.io --username "$DOCKER_USERNAME" --password-stdin
      - helm package dist/chart/
      - helm push *.tgz oci://docker.io/thegeeklab
    when:
      - event: [tag]

  - name: publish-chart-quay
    image: quay.io/thegeeklab/kube-tools
    depends_on: [publish-github]
    environment:
      QUAY_USERNAME:
        from_secret: quay_username
      QUAY_PASSWORD:
        from_secret: quay_password
    commands:
      - echo "$QUAY_PASSWORD" | helm registry login quay.io --username "$QUAY_USERNAME" --password-stdin
      - helm package dist/chart/
      - helm push *.tgz oci://quay.io/thegeeklab
    when:
      - event: [tag]

  - name: helm-docs
    image: docker.io/jnorwood/helm-docs:v1.14.2
    commands:
      - helm-docs -c dist/chart/

  - name: prettier
    image: docker.io/jauderho/prettier:3.8.3
    commands:
      - prettier -w dist/chart/README.md
      - cat dist/chart/README.md

  - name: publish
    image: quay.io/thegeeklab/wp-git-action
    settings:
      action:
        - commit
        - push
      author_email: bot@thegeeklab.de
      author_name: thegeeklab-bot
      message: "[skip ci] auto-update chart version and documentation"
      netrc_password:
        from_secret: github_token
    when:
      - event: [tag]

depends_on:
  - static
  - test

---
when:
  - event: [pull_request, tag]
  - event: [push, manual]
    branch:
      - ${CI_REPO_DEFAULT_BRANCH}

steps:
  - name: eslint
    image: docker.io/library/node:lts
    depends_on: []
    commands:
      - make frontend-deps eslint
    environment:
      FORCE_COLOR: "true"

  - name: markdownlint
    image: quay.io/thegeeklab/markdownlint-cli
    depends_on: []
    commands:
      - markdownlint 'docs/*.md' 'dist/chart/README.md' 'README.md' 'CONTRIBUTING.md'

  - name: yaml-lint
    image: docker.io/library/golang:1.26.4
    commands:
      - make yamlfmt-lint

  - name: spellcheck
    image: ghcr.io/streetsidesoftware/cspell
    commands:
      - cspell-cli lint . --gitignore --color

  - name: golangci-lint
    image: docker.io/library/golang:1.26.4
    commands:
      - make golangci-lint

  - name: installer-verify
    image: docker.io/library/golang:1.26.4
    commands:
      - make build-installer
      - git diff --exit-code

  - name: helm-lint
    image: quay.io/helmpack/chart-testing:v3.14.0
    commands:
      - ct list-changed --target-branch ${CI_REPO_DEFAULT_BRANCH} --charts dist/chart
      - ct lint --target-branch ${CI_REPO_DEFAULT_BRANCH} --charts dist/chart --validate-maintainers=false
